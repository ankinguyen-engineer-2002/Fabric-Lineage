const { useState, useRef, useEffect, useCallback, useMemo } = React;

function parseLineageText(text) {
  const lines = text.trim().split("\n").filter(l => l.trim());
  const nbMap = {};
  let current = null;
  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed.startsWith("===") || trimmed.startsWith("LINEAGE:") || trimmed.startsWith("CROSS-NOTEBOOK")) continue;
    const nbMatch = trimmed.match(/^(?:\u{1F4D3}\s*)?(\S+)\s*:?\s*$/u);
    if (nbMatch && !trimmed.match(/^(WRITES|READS)\s/i)) { current = nbMatch[1]; nbMap[current] = { reads: [], writes: [] }; continue; }
    if (!current && trimmed.match(/^nb_\w+/)) { const nm = trimmed.match(/^(nb_\w+)/); current = nm[1]; nbMap[current] = { reads: [], writes: [] }; }
    if (!current) continue;
    for (const m of trimmed.matchAll(/WRITES?\s*(?:->|→)\s*(\S+)/gi)) nbMap[current].writes.push(m[1].replace(/^dbo\./, "").replace(/^SupplyChain_Lakehouse\.dbo\./, ""));
    for (const m of trimmed.matchAll(/READS?\s*(?:<-|←)\s*(\S+)/gi)) nbMap[current].reads.push(m[1].replace(/^dbo\./, "").replace(/^SupplyChain_Lakehouse\.dbo\./, ""));
  }
  return nbMap;
}

function getTableNodeType(name) {
  const n = name.toLowerCase();
  if (n.startsWith("brz2_") || n.startsWith("brz_")) return "source";
  if (n.startsWith("slv_")) return "staging";
  if (n.startsWith("gld_dim_") || n.startsWith("dim_")) return "dim";
  if (n.startsWith("gld_fact_") || n.startsWith("gld_") || n.startsWith("fact_")) return "fact";
  if (n.startsWith("utl_") || n.startsWith("ref_") || n.startsWith("stg_")) return "utility";
  if (/^[A-Z]/.test(name) || ["source","parquet"].includes(n)) return "source";
  return "staging";
}

function getNbVisualType(nbName) {
  const n = nbName.toLowerCase();
  if (n.startsWith("nb_brz_") || n.startsWith("nb_brz2_")) return "nb_brz";
  if (n.startsWith("nb_slv_")) return "nb_slv";
  if (n.startsWith("nb_gld_")) return "nb_gld";
  if (n.startsWith("nb_utl_") || n.startsWith("nb_ult_")) return "nb_utl";
  return "nb_other";
}

const TYPE_CONFIG = {
  source:   { color: "#22c55e", label: "Bronze/Src", icon: "◇" },
  staging:  { color: "#3b82f6", label: "Silver",     icon: "◆" },
  dim:      { color: "#a78bfa", label: "Dim",        icon: "◈" },
  fact:     { color: "#f59e0b", label: "Fact",        icon: "★" },
  utility:  { color: "#64748b", label: "Utility",     icon: "◎" },
  nb_brz:   { color: "#f97316", label: "NB Bronze",  icon: "⚙" },
  nb_slv:   { color: "#0ea5e9", label: "NB Silver",  icon: "⚙" },
  nb_gld:   { color: "#10b981", label: "NB Gold",    icon: "⚙" },
  nb_utl:   { color: "#8b5cf6", label: "NB Utility", icon: "⚙" },
  nb_other: { color: "#ec4899", label: "NB Other",   icon: "⚙" },
};
const NB_TYPES = ["nb_brz","nb_slv","nb_gld","nb_utl","nb_other"];
const TBL_TYPES = ["source","staging","dim","fact","utility"];
const SKIP_TABLES = new Set(["source","parquet","activity","code","impact","trace","Parquet"]);

function lineageToGraph(nbMap) {
  const nodes = new Map(), edges = [], edgeSet = new Set();
  const addEdge = (from, to) => { const k=`${from}→${to}`; if(!edgeSet.has(k)&&from!==to){edgeSet.add(k);edges.push({from,to});} };
  for (const [nbName, info] of Object.entries(nbMap)) {
    const reads = info.reads.filter(t => !SKIP_TABLES.has(t)&&!SKIP_TABLES.has(t.toLowerCase()));
    const writes = info.writes.filter(t => !SKIP_TABLES.has(t)&&!SKIP_TABLES.has(t.toLowerCase()));
    if (!reads.length && !writes.length) continue;
    nodes.set(nbName, { id: nbName, name: nbName.replace(/^nb_/,""), fullName: nbName, type: getNbVisualType(nbName), isNb: true });
    for (const t of reads) { const c=t.replace(/^dbo\./,""); if(!nodes.has(c)) nodes.set(c,{id:c,name:c,fullName:c,type:getTableNodeType(c),isNb:false}); addEdge(c, nbName); }
    for (const t of writes) { const c=t.replace(/^dbo\./,""); if(!nodes.has(c)) nodes.set(c,{id:c,name:c,fullName:c,type:getTableNodeType(c),isNb:false}); addEdge(nbName, c); }
  }
  return { nodes: Array.from(nodes.values()), edges };
}

/* ─── Extraction (unchanged) ─── */
const NB_SKIP_WORDS = new Set(['select','where','set','if','table','view','as','on','and','or','not','null','true','false','case','when','then','else','end','group','order','by','having','limit','union','all','distinct','exists','between','like','in','is','dual','temp','temporary','current_fiscal','cf']);
function cleanNotebookContent(raw){let c=raw;c=c.replace(/^(?:#|--)\ *Fabric notebook source\ *$/gm,'');c=c.replace(/^(?:#|--)\ *METADATA\ *\*+.*$/gm,'');c=c.replace(/^(?:#|--)\ *META\b.*$/gm,'');c=c.replace(/^(?:#|--)\ *CELL\ *\*+.*$/gm,'');c=c.replace(/^(?:(?:#|--)\ *MAGIC\ +)?%%sql\ *$/gm,'');c=c.replace(/^(?:#|--)\ *MAGIC ?/gm,'');c=c.replace(/^\s*(?:from|import)\s+.*$/gm,'');return c;}
function matchAll(text,pattern){const re=new RegExp(pattern.source,pattern.flags);const results=[];let m;while((m=re.exec(text))!==null)results.push(m);return results;}
function extractTablesFromContent(content){const tablesRead=new Set(),tablesWrite=new Set();const sqlFragments=[];const reSparkSql=/spark\.sql\(\s*(?:f?"""([\s\S]*?)"""|f?'''([\s\S]*?)'''|f?"([^"]*)"|f?'([^']*)')\s*\)/g;let m;while((m=reSparkSql.exec(content))!==null){const sql=m[1]||m[2]||m[3]||m[4];if(sql)sqlFragments.push(sql);}content=content.replace(/--.*$/gm,'');content=content.replace(/\/\*[\s\S]*?\*\//g,'');for(let frag of sqlFragments){frag=frag.replace(/--.*$/gm,'');frag=frag.replace(/\/\*[\s\S]*?\*\//g,'');content+="\n"+frag;}const cteNames=new Set();for(const m of matchAll(content,/(?:WITH|,)\s+([a-zA-Z_]\w*)\s+AS\s*\(/gi))cteNames.add(m[1].toLowerCase());for(const m of matchAll(content,/(?:CREATE\s+(?:OR\s+REPLACE\s+)?TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?)`?([a-zA-Z_]\w*(?:\.\w+)*)`?/gi))tablesWrite.add(m[1]);for(const m of matchAll(content,/(?:INSERT\s+(?:INTO|OVERWRITE)\s+(?:TABLE\s+)?)`?([a-zA-Z_]\w*(?:\.\w+)*)`?/gi))tablesWrite.add(m[1]);for(const m of matchAll(content,/\.(?:saveAsTable|insertInto)\(["']([^"']+)["']\)/g))tablesWrite.add(m[1]);for(const m of matchAll(content,/MERGE\s+INTO\s+`?([a-zA-Z_]\w*(?:\.\w+)*)`?/gi))tablesWrite.add(m[1]);for(const m of matchAll(content,/DROP\s+TABLE\s+(?:IF\s+EXISTS\s+)?`?([a-zA-Z_]\w*(?:\.\w+)*)`?/gi))tablesWrite.add(m[1]);for(const m of matchAll(content,/TRUNCATE\s+TABLE\s+`?([a-zA-Z_]\w*(?:\.\w+)*)`?/gi))tablesWrite.add(m[1]);for(const m of matchAll(content,/(?:FROM|(?:LEFT|RIGHT|INNER|OUTER|CROSS|FULL)\s+(?:OUTER\s+)?JOIN|JOIN)\s+`?([a-zA-Z_]\w*(?:\.\w+)*)`?/gi))tablesRead.add(m[1]);for(const m of matchAll(content,/spark\.(?:read\.)?table\(["']([^"']+)["']\)/g))tablesRead.add(m[1]);for(const m of matchAll(content,/DeltaTable\.forName\(\s*spark\s*,\s*["']([^"']+)["']\)/g))tablesRead.add(m[1]);for(const m of matchAll(content,/DeltaTable\.forPath\(\s*spark\s*,\s*["']([^"']+)["']\)/g))tablesRead.add(m[1]);const skipSet=new Set([...NB_SKIP_WORDS,...cteNames]);const filteredWrite=[...tablesWrite].filter(t=>!skipSet.has(t.toLowerCase())&&t.length>2);const writeSet=new Set(filteredWrite);const filteredRead=[...tablesRead].filter(t=>!skipSet.has(t.toLowerCase())&&t.length>2&&!writeSet.has(t));return{reads:filteredRead.sort(),writes:filteredWrite.sort()};}
function fabricFetch(p,o={}){return fetch(`https://api.fabric.microsoft.com/v1/${p}`,o);}
let msalInstance=null;
async function loginViaBrowser(clientId){if(!clientId)throw new Error('No Client ID');msalInstance=new msal.PublicClientApplication({auth:{clientId,authority:'https://login.microsoftonline.com/organizations',redirectUri:window.location.href.split('?')[0].split('#')[0]},cache:{cacheLocation:'sessionStorage'}});const lr=await msalInstance.loginPopup({scopes:['https://api.fabric.microsoft.com/.default']});const tr=await msalInstance.acquireTokenSilent({scopes:['https://api.fabric.microsoft.com/.default'],account:lr.account});return tr.accessToken;}
async function fetchNotebookDefinition(token,wid,nid){const h={'Authorization':`Bearer ${token}`};const r=await fabricFetch(`workspaces/${wid}/notebooks/${nid}/getDefinition`,{method:'POST',headers:h});if(r.ok)return await r.json();if(r.status===202){const loc=r.headers.get('X-Location')||r.headers.get('Location');const ra=parseInt(r.headers.get('Retry-After')||'3',10);if(!loc)return null;for(let i=0;i<30;i++){await new Promise(r=>setTimeout(r,ra*1000));const p=await fetch(loc,{headers:h});if(p.ok){const d=await p.json();if(d.status==='Succeeded'){const r2=await fetch(loc.replace(/\/$/,'')+'/result',{headers:h});if(r2.ok)return await r2.json();break;}if(d.status==='Failed')break;}}}return null;}
async function extractAllNotebooks(token,wid,prefix,onLog,signal){const h={'Authorization':`Bearer ${token}`};onLog('Fetching notebook list...');const lr=await fabricFetch(`workspaces/${wid}/items?type=Notebook`,{headers:h,signal});if(!lr.ok)throw new Error(`Failed: ${lr.status}`);const all=(await lr.json()).value||[];const nbs=all.filter(nb=>nb.displayName.startsWith(prefix));onLog(`Found ${nbs.length} notebooks with prefix "${prefix}" (total: ${all.length})`);const results={};let idx=0;async function worker(){while(idx<nbs.length){if(signal?.aborted)return;const i=idx++;const nb=nbs[i];const nm=nb.displayName;try{const defn=await fetchNotebookDefinition(token,wid,nb.id);if(!defn){onLog(`  SKIP: ${nm}`);continue;}const parts=[];for(const part of(defn.definition?.parts||[])){if(!part.payload)continue;let d;try{d=atob(part.payload);}catch{d=part.payload;}try{const j=JSON.parse(d);if(j.cells){for(const cell of j.cells){const s=cell.source;if(Array.isArray(s))parts.push(s.join(''));else if(typeof s==='string')parts.push(s);}continue;}}catch{}parts.push(d);}const cleaned=cleanNotebookContent(parts.join('\n'));if(!cleaned.trim()){onLog(`  SKIP: ${nm}`);continue;}const lineage=extractTablesFromContent(cleaned);if(lineage.reads.length>0||lineage.writes.length>0){results[nm]=lineage;onLog(`  OK: ${nm} (reads=${lineage.reads.length}, writes=${lineage.writes.length})`);}else onLog(`  SKIP: ${nm}`);}catch(err){onLog(`  ERROR: ${nm} - ${err.message}`);}}}const workers=[];for(let w=0;w<Math.min(5,nbs.length);w++)workers.push(worker());await Promise.all(workers);return results;}
function buildLineageOutput(results){return Object.keys(results).sort().map(nb=>{const info=results[nb];const lines=[nb];for(const w of info.writes)lines.push(`  WRITES -> dbo.${w}`);for(const r of info.reads)lines.push(`  READS  <- dbo.${r}`);return lines.join('\n');}).join('\n\n');}

/* ═══════════════════════════════════════════════════════════
   BRIDGE EDGES — skip hidden nodes, reconnect lineage
   ═══════════════════════════════════════════════════════════ */
function buildBridgedGraph(nodes, edges, hiddenTypes) {
  if (hiddenTypes.size === 0) return { visNodes: nodes, visEdges: edges };
  const hiddenIds = new Set();
  nodes.forEach(n => { if (hiddenTypes.has(n.type)) hiddenIds.add(n.id); });
  if (hiddenIds.size === 0) return { visNodes: nodes, visEdges: edges };

  const fwd = new Map(), bwd = new Map();
  nodes.forEach(n => { fwd.set(n.id, []); bwd.set(n.id, []); });
  edges.forEach(e => { if(fwd.has(e.from)) fwd.get(e.from).push(e.to); if(bwd.has(e.to)) bwd.get(e.to).push(e.from); });

  function findVisible(startId, getNeighbors) {
    const result = [], visited = new Set([startId]), queue = [startId];
    while (queue.length) {
      const cur = queue.shift();
      for (const next of (getNeighbors(cur) || [])) {
        if (visited.has(next)) continue; visited.add(next);
        if (!hiddenIds.has(next)) result.push(next); else queue.push(next);
      }
    }
    return result;
  }

  const bridgeSet = new Set(), bridgeEdges = [];
  hiddenIds.forEach(hid => {
    const ups = findVisible(hid, id => bwd.get(id) || []);
    const downs = findVisible(hid, id => fwd.get(id) || []);
    for (const u of ups) for (const d of downs) {
      const key = `${u}→${d}`;
      if (u !== d && !bridgeSet.has(key)) { bridgeSet.add(key); bridgeEdges.push({ from: u, to: d, isBridge: true }); }
    }
  });

  const visNodes = nodes.filter(n => !hiddenIds.has(n.id));
  const visIds = new Set(visNodes.map(n => n.id));
  const kept = edges.filter(e => visIds.has(e.from) && visIds.has(e.to));
  const keptSet = new Set(kept.map(e => `${e.from}→${e.to}`));
  for (const be of bridgeEdges) { if (!keptSet.has(`${be.from}→${be.to}`)) kept.push(be); }
  return { visNodes, visEdges: kept };
}

/* ═══════════════════════════════════════════════════════════
   DAG LAYOUT
   ═══════════════════════════════════════════════════════════ */
function layoutDAG(nodes, edges, collapsed) {
  const { visNodes: vis, visEdges: vEdges } = buildBridgedGraph(nodes, edges, collapsed);
  const vIds = new Set(vis.map(n => n.id));
  const parents = new Map();
  vis.forEach(n => parents.set(n.id, []));
  vEdges.forEach(e => { if (parents.has(e.to) && vIds.has(e.from)) parents.get(e.to).push(e.from); });

  const layers = new Map(), done = new Set();
  function assign(id) { if(done.has(id))return layers.get(id)||0;done.add(id);const p=parents.get(id)||[];if(!p.length){layers.set(id,0);return 0;}let mx=0;for(const pp of p)mx=Math.max(mx,assign(pp)+1);layers.set(id,mx);return mx; }
  vis.forEach(n => assign(n.id));

  const groups = new Map();
  vis.forEach(n => { const l=layers.get(n.id)||0; if(!groups.has(l))groups.set(l,[]); groups.get(l).push(n); });
  const sorted = Array.from(groups.keys()).sort((a,b)=>a-b);
  const tp = {source:0,nb_brz:1,staging:2,nb_slv:3,dim:4,fact:5,nb_gld:6,utility:7,nb_utl:8,nb_other:9};
  sorted.forEach(l=>{groups.get(l).sort((a,b)=>{const pa=tp[a.type]??99,pb=tp[b.type]??99;return pa!==pb?pa-pb:a.name.localeCompare(b.name);});});
  for(let iter=0;iter<8;iter++){for(let li=1;li<sorted.length;li++){const g=groups.get(sorted[li]),prev=groups.get(sorted[li-1]);const po=new Map();prev.forEach((n,i)=>po.set(n.id,i));const bc=new Map();g.forEach(n=>{const p=(parents.get(n.id)||[]).filter(pp=>po.has(pp));if(p.length)bc.set(n.id,p.reduce((s,pp)=>s+po.get(pp),0)/p.length);});g.sort((a,b)=>(bc.get(a.id)??999)-(bc.get(b.id)??999));}}

  const NW=230,NH=34,HG=90,VG=10,np=new Map();
  sorted.forEach(l=>{const g=groups.get(l);const th=g.length*NH+(g.length-1)*VG;const sy=-th/2;g.forEach((n,i)=>{np.set(n.id,{x:l*(NW+HG),y:sy+i*(NH+VG),w:NW,h:NH,node:n});});});
  return { nodePositions:np, visibleEdges:vEdges, visibleNodes:vis };
}

/* ═══════════════════════════════════════════════════════════

function EdgePath({from,to,color,highlight,dim,isBridge}){const x1=from.x+from.w+1,y1=from.y+from.h/2,x2=to.x-1,y2=to.y+to.h/2,mx=(x1+x2)/2;return<g><path d={`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`} fill="none" stroke={highlight?color:"#334155"} strokeWidth={highlight?2:0.8} strokeOpacity={dim?0.04:highlight?0.8:0.2} strokeDasharray={isBridge?"6,3":"none"} style={{transition:"all 0.2s"}}/>{highlight&&<polygon points={`${x2},${y2} ${x2-6},${y2-3} ${x2-6},${y2+3}`} fill={color} opacity={0.75}/>}</g>;}

function NodeBox({pos,isFocus,isConn,isDim,isSH,isSD,onHover,onSelect}){const cfg=TYPE_CONFIG[pos.node.type]||TYPE_CONFIG.staging;const isNb=pos.node.isNb;const rx=isNb?17:6;const dn=pos.node.name.length>30?pos.node.name.slice(0,28)+"…":pos.node.name;let bg="#0f1520",border="#1e293b",bw=1,op=1,tc="#94a3b8";if(isFocus){bg=cfg.color+"18";border=cfg.color;bw=2.5;tc="#f1f5f9";}else if(isConn){border=cfg.color+"60";tc="#d1d5db";bg=cfg.color+"08";}else if(isSH){bg=cfg.color+"18";border=cfg.color;bw=2;}if(isDim||isSD)op=0.12;return<g className="nd" style={{cursor:"pointer"}} onMouseEnter={onHover} onMouseLeave={()=>onHover(null)} onClick={onSelect}><rect x={pos.x+1.5} y={pos.y+1.5} width={pos.w} height={pos.h} rx={rx} fill="#000" opacity={op*0.15}/><rect x={pos.x} y={pos.y} width={pos.w} height={pos.h} rx={rx} fill={bg} stroke={border} strokeWidth={bw} opacity={op} style={{transition:"all 0.15s"}}/><circle cx={pos.x+14} cy={pos.y+pos.h/2} r={isNb?3.5:3} fill={cfg.color} opacity={op*0.9}/>{isNb&&<text x={pos.x+24} y={pos.y+pos.h/2+1} dominantBaseline="central" fill={cfg.color} fontSize={10} opacity={op*0.7} fontFamily="sans-serif">⚙</text>}<text x={pos.x+(isNb?36:24)} y={pos.y+pos.h/2+1} dominantBaseline="central" fill={tc} fontSize={10.5} fontWeight={isNb?600:400} fontFamily="'JetBrains Mono',monospace" opacity={op} style={{transition:"fill 0.15s"}}>{dn}</text></g>;}

/* ═══════════════════════════════════════════════════════════
   MAIN CANVAS
   ═══════════════════════════════════════════════════════════ */
function DiagramCanvas({graph,collapsed,searchTerm}){
  const{nodePositions:np,visibleEdges:ve,visibleNodes:vn}=useMemo(()=>layoutDAG(graph.nodes,graph.edges,collapsed),[graph,collapsed]);
  const[hov,setHov]=useState(null);const[sel,setSel]=useState(null);const ref=useRef(null);const[pan,setPan]=useState({x:0,y:0});const[zoom,setZoom]=useState(1);const[drag,setDrag]=useState(false);const ds=useRef(null);const fid=sel||hov;

  const conn=useMemo(()=>{if(!fid)return new Set();const ids=new Set([fid]);let q=[fid];while(q.length){const c=q.shift();ve.forEach(e=>{if(e.to===c&&!ids.has(e.from)){ids.add(e.from);q.push(e.from);}});}q=[fid];while(q.length){const c=q.shift();ve.forEach(e=>{if(e.from===c&&!ids.has(e.to)){ids.add(e.to);q.push(e.to);}});}return ids;},[fid,ve]);

  const sm=useMemo(()=>{if(!searchTerm)return null;const s=searchTerm.toLowerCase(),ids=new Set();vn.forEach(n=>{if(n.name.toLowerCase().includes(s)||n.id.toLowerCase().includes(s))ids.add(n.id);});return ids.size>0?ids:null;},[searchTerm,vn]);

  const fitView=useCallback(()=>{if(!ref.current||np.size===0)return;let a=Infinity,b=Infinity,c=-Infinity,d=-Infinity;np.forEach(p=>{a=Math.min(a,p.x);b=Math.min(b,p.y);c=Math.max(c,p.x+p.w);d=Math.max(d,p.y+p.h);});const gw=c-a+140,gh=d-b+140,cw=ref.current.clientWidth,ch=ref.current.clientHeight;const fz=Math.min(cw/gw,ch/gh,1.5);setZoom(fz);setPan({x:cw/2-((a+c)/2)*fz,y:ch/2-((b+d)/2)*fz});},[np]);

gld_dim_product\n  WRITES -> dbo.gld_dim_product\n  READS  <- dbo.slv_product\n\nnb_gld_dim_warehouse\n  WRITES -> dbo.gld_dim_warehouse\n  READS  <- dbo.slv_warehouse\n\nnb_gld_fact_invoice_detail_line_level\n  WRITES -> dbo.gld_fact_invoice_detail_line_level\n  READS  <- dbo.slv_customer_grouping\n  READS  <- dbo.slv_invoice_detail\n\nnb_gld_fact_open_order_line_level\n  WRITES -> dbo.gld_fact_open_order_line_level\n  READS  <- dbo.slv_item_master\n  READS  <- dbo.slv_open_order_detail\n  READS  <- dbo.slv_open_order_header\n  READS  <- dbo.slv_open_order_header_extended\n  READS  <- dbo.slv_open_order_item_detail_extended\n  READS  <- dbo.slv_order_type\n\nnb_gld_fact_invoice_weekly\n  WRITES -> dbo.gld_fact_invoice_weekly\n  READS  <- dbo.gld_fact_invoice_detail_line_level\n  READS  <- dbo.slv_calendar\n\nnb_gld_fact_actual_demand_monthly\n  WRITES -> dbo.gld_fact_actual_demand_monthly\n  READS  <- dbo.gld_fact_invoice_detail_line_level\n  READS  <- dbo.gld_fact_open_order_line_level\n  READS  <- dbo.slv_calendar\n  READS  <- dbo.slv_customer_grouping\n\nnb_gld_fact_actual_demand_weekly\n  WRITES -> dbo.gld_fact_actual_demand_weekly\n  READS  <- dbo.gld_fact_invoice_detail_line_level\n  READS  <- dbo.gld_fact_open_order_line_level\n  READS  <- dbo.slv_calendar\n  READS  <- dbo.slv_customer_grouping\n\nnb_gld_fact_open_order_monthly\n  WRITES -> dbo.gld_fact_open_order_monthly\n  READS  <- dbo.gld_fact_open_order_line_level\n  READS  <- dbo.slv_calendar\n  READS  <- dbo.slv_customer_grouping\n\nnb_gld_fact_forecast_demand_monthly\n  WRITES -> dbo.gld_fact_forecast_demand_monthly\n  READS  <- dbo.slv_calendar\n  READS  <- dbo.slv_demand_forecast_snapshot\n  READS  <- dbo.slv_forecast_cycle\n\nnb_gld_fact_naive_forecast_monthly\n  WRITES -> dbo.gld_fact_naive_forecast_monthly\n  READS  <- dbo.gld_fact_actual_demand_monthly\n  READS  <- dbo.slv_calendar\n\nnb_gld_fact_flat_forecast_actual\n  WRITES -> dbo.gld_fact_flat_forecast_actual\n  READS  <- dbo.gld_fact_actual_demand_monthly\n  READS  <- dbo.gld_fact_forecast_demand_monthly\n  READS  <- dbo.gld_fact_naive_forecast_monthly\n\nnb_gld_fact_forecast_kpi_metric\n  WRITES -> dbo.gld_fact_fcst_accuracy_kpi_monthly\n  READS  <- dbo.gld_fact_actual_demand_monthly\n  READS  <- dbo.gld_fact_forecast_demand_monthly\n  READS  <- dbo.gld_fact_naive_forecast_monthly\n\nnb_actual_demand\n  WRITES -> dbo.slv_actual_demand\n  READS  <- dbo.brz2_AFISales_DW__DimCustomers\n  READS  <- dbo.brz2_AFISales_DW__FactOpenOrders\n  READS  <- dbo.brz2_Enterprise_DW__DimDate\n  READS  <- dbo.brz2_Wholesale_ProductSourcing_AFI__CustomerGrouping\n  READS  <- dbo.brz2_Wholesale_SalesHistory_AFI__InvoiceDetail\n\nnb_forecast_demand\n  WRITES -> dbo.slv_forecast_demand\n  READS  <- dbo.brz2_SupplyChain_Enh__DemandForecastSnapshot\n\nnb_naive_forecast\n  WRITES -> dbo.slv_naive_forecast\n  READS  <- dbo.brz2_AFISales_DW__DimCustomers\n  READS  <- dbo.brz2_AFISales_DW__FactOpenOrders\n  READS  <- dbo.brz2_Enterprise_DW__DimDate\n  READS  <- dbo.brz2_Wholesale_ProductSourcing_AFI__CustomerGrouping\n  READS  <- dbo.brz2_Wholesale_SalesHistory_AFI__InvoiceDetail\n\nnb_dim_product\n  WRITES -> dbo.slv_dim_product\n  READS  <- dbo.brz2_SupplyChain_DW__DimCurrentProductDetails\n\nnb_flat_forecast_actual\n  WRITES -> dbo.gld_flat_forecast_actual\n  READS  <- dbo.slv_actual_demand\n  READS  <- dbo.slv_forecast_demand\n  READS  <- dbo.slv_naive_forecast\n\nnb_forecast_kpi\n  WRITES -> dbo.gld_forecast_kpi\n  READS  <- dbo.brz2_SupplyChain_Enh__DemandForecastSnapshot\n  READS  <- dbo.slv_actual_demand\n  READS  <- dbo.slv_forecast_demand\n  READS  <- dbo.slv_naive_forecast\n\nnb_utl_pipeline_metadata\n  WRITES -> SupplyChain_Lakehouse.dbo.utl_pipeline_metadata\n  READS  <- SupplyChain_Lakehouse.dbo.brz_SupplyChain_Enh_1__DemandForecastSnapshotDaily`;

/* ═══════════════════════════════════════════════════════════
   MAIN APP — TOGGLE ON/OFF BUTTONS
   ═══════════════════════════════════════════════════════════ */
const hB={padding:"5px 12px",fontSize:11,background:"#111827",border:"1px solid #1e293b",borderRadius:6,color:"#64748b",cursor:"pointer"};

function App(){
  const[graph,setGraph]=useState(()=>lineageToGraph(parseLineageText(SAMPLE)));
  const[showImp,setShowImp]=useState(false);const[impTxt,setImpTxt]=useState("");
  const[search,setSearch]=useState("");const[showSrc,setShowSrc]=useState(false);
  const[collapsed,setCollapsed]=useState(new Set());
  const[showChat,setShowChat]=useState(false);const[showExtract,setShowExtract]=useState(false);

  const tc=useMemo(()=>{const c={};graph.nodes.forEach(n=>{c[n.type]=(c[n.type]||0)+1;});return c;},[graph]);
  const nbCount=useMemo(()=>graph.nodes.filter(n=>n.isNb).length,[graph]);
  const tblCount=useMemo(()=>graph.nodes.filter(n=>!n.isNb).length,[graph]);
  const visCount=useMemo(()=>{let nb=0,tbl=0;graph.nodes.forEach(n=>{if(!collapsed.has(n.type)){if(n.isNb)nb++;else tbl++;}});return{nb,tbl};},[graph,collapsed]);

  const load=()=>{try{const p=JSON.parse(impTxt);if(p.nodes&&p.edges){setGraph(p);setShowImp(false);setImpTxt("");return;}}catch{}const nb=parseLineageText(impTxt);if(Object.keys(nb).length>0){setGraph(lineageToGraph(nb));setShowImp(false);setImpTxt("");}else alert("Could not parse.");};
  const loadFromExtract=(text)=>{const nb=parseLineageText(text);if(Object.keys(nb).length>0){setGraph(lineageToGraph(nb));setShowExtract(false);}else alert("Could not parse.");};
  const exp=()=>{const b=new Blob([JSON.stringify(graph,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="lineage.json";a.click();URL.revokeObjectURL(u);};
  const toggle=t=>{setCollapsed(p=>{const n=new Set(p);if(n.has(t))n.delete(t);else n.add(t);return n;});};
  const toggleGroup=(types)=>{const allHidden=types.every(t=>collapsed.has(t));setCollapsed(p=>{const n=new Set(p);types.forEach(t=>{if(allHidden)n.delete(t);else n.add(t);});return n;});};
  const allNbHidden=NB_TYPES.every(t=>collapsed.has(t));
  const allTblHidden=TBL_TYPES.every(t=>collapsed.has(t));

  return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#0a0f1a"}}>
    <div style={{minHeight:48,borderBottom:"1px solid #151d2e",display:"flex",alignItems:"center",padding:"0 16px",gap:8,background:"#0d1322",flexShrink:0,flexWrap:"wrap"}}>
      <svg width="16" height="16" viewBox="0 0 16 16" style={{opacity:0.5}}><circle cx="3" cy="8" r="2" fill="#3b82f6"/><circle cx="8" cy="4" r="2" fill="#a78bfa"/><circle cx="8" cy="12" r="2" fill="#f59e0b"/><circle cx="13" cy="8" r="2" fill="#22c55e"/><line x1="5" y1="8" x2="6" y2="5" stroke="#334155"/><line x1="5" y1="8" x2="6" y2="11" stroke="#334155"/><line x1="10" y1="4" x2="11" y2="7" stroke="#334155"/><line x1="10" y1="12" x2="11" y2="9" stroke="#334155"/></svg>
      <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>Lineage</span>
      <span style={{fontSize:10,color:"#475569"}}>{visCount.nb} nb · {visCount.tbl} tbl</span>
      <div style={{flex:1}}/>

      {/* ─── TOGGLE BUTTONS ─── */}
      <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>
        <button onClick={()=>setCollapsed(new Set())} title="Show all" style={{...hB,padding:"3px 8px",fontSize:10,background:collapsed.size===0?"#1e293b":"transparent",border:collapsed.size===0?"1px solid #334155":"1px solid transparent",color:collapsed.size===0?"#cbd5e1":"#475569",fontWeight:600}}>All</button>

        <button onClick={()=>toggleGroup(NB_TYPES)} title={allNbHidden?"Show notebooks":"Hide notebooks — bridge edges"} style={{...hB,padding:"3px 8px",fontSize:10,fontWeight:600,background:allNbHidden?"#f9731622":"#0ea5e918",border:`1px solid ${allNbHidden?"#f9731644":"#0ea5e933"}`,color:allNbHidden?"#f97316":"#0ea5e9"}}>⚙ NB {allNbHidden?"OFF":"ON"}</button>

        <button onClick={()=>toggleGroup(TBL_TYPES)} title={allTblHidden?"Show tables":"Hide tables — bridge edges"} style={{...hB,padding:"3px 8px",fontSize:10,fontWeight:600,background:allTblHidden?"#f59e0b22":"#22c55e18",border:`1px solid ${allTblHidden?"#f59e0b44":"#22c55e33"}`,color:allTblHidden?"#f59e0b":"#22c55e"}}>◆ TBL {allTblHidden?"OFF":"ON"}</button>

        <div style={{width:1,height:18,background:"#1e293b",margin:"0 2px"}}/>

        {Object.entries(TYPE_CONFIG).map(([t,cfg])=>{const cnt=tc[t]||0;if(!cnt)return null;const isOff=collapsed.has(t);return<button key={t} onClick={()=>toggle(t)} title={isOff?`Show ${cfg.label}`:`Hide ${cfg.label} — lineage bridges through`} style={{padding:"3px 8px",fontSize:10,borderRadius:6,cursor:"pointer",background:isOff?"#0f1520":cfg.color+"15",border:`1px solid ${isOff?"#1e293b":cfg.color+"40"}`,color:isOff?"#334155":cfg.color,textDecoration:isOff?"line-through":"none",display:"flex",alignItems:"center",gap:3,opacity:isOff?0.45:1,transition:"all 0.15s"}}><span style={{fontSize:8}}>{cfg.icon}</span>{cfg.label} ({cnt})</button>;})}
      </div>

      <div style={{width:1,height:20,background:"#1e293b",margin:"0 4px"}}/>
      {showSrc&&<input autoFocus value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filter..." style={{width:160,padding:"4px 8px",background:"#111827",border:"1px solid #1e293b",borderRadius:5,color:"#cbd5e1",fontSize:11,outline:"none"}}/>}
      <button onClick={()=>{setShowSrc(!showSrc);if(showSrc)setSearch("");}} style={{...hB,padding:"4px 8px"}}>{showSrc?"✕":"⌕"}</button>
      <button onClick={()=>{setShowExtract(!showExtract);if(!showExtract)setShowChat(false);}} style={{...hB,background:showExtract?"#f59e0b22":"#111827",borderColor:showExtract?"#f59e0b55":"#1e293b",color:showExtract?"#f59e0b":"#64748b",fontWeight:700,display:"flex",alignItems:"center",gap:4}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Extract</button>
      <button onClick={()=>setShowImp(!showImp)} style={{...hB,background:showImp?"#1e3a5f":"#111827",borderColor:showImp?"#3b82f6":"#1e293b",color:showImp?"#93c5fd":"#64748b"}}>Import</button>
      <button onClick={exp} style={hB}>Export</button>
      <button onClick={()=>{setShowChat(!showChat);if(!showChat)setShowExtract(false);}} style={{...hB,background:showChat?"#7c3aed22":"#111827",borderColor:showChat?"#7c3aed55":"#1e293b",color:showChat?"#a78bfa":"#64748b",fontWeight:700}}>✦ AI</button>
    </div>

    {showImp&&<div style={{borderBottom:"1px solid #151d2e",background:"#0d1322",padding:"12px 16px",display:"flex",gap:10,flexShrink:0}}><textarea value={impTxt} onChange={e=>setImpTxt(e.target.value)} rows={5} placeholder={"Paste lineage:\n\nnb_xxx\n  WRITES -> dbo.table\n  READS  <- dbo.table"} style={{flex:1,background:"#0a0f1a",border:"1px solid #1e293b",borderRadius:6,color:"#cbd5e1",padding:10,fontSize:11,resize:"vertical",outline:"none"}}/><div style={{display:"flex",flexDirection:"column",gap:6}}><button onClick={load} style={{...hB,background:"#16a34a22",borderColor:"#16a34a55",color:"#4ade80",padding:"8px 16px",fontWeight:700}}>Load</button><button onClick={()=>setImpTxt("")} style={{...hB,padding:"8px 16px"}}>Clear</button></div></div>}

    <div style={{flex:1,display:"flex",overflow:"hidden"}}>
      <DiagramCanvas graph={graph} collapsed={collapsed} searchTerm={search}/>
      {showChat&&<ChatPanel graph={graph} onClose={()=>setShowChat(false)}/>}
      {showExtract&&<ExtractPanel onClose={()=>setShowExtract(false)} onLoadResults={loadFromExtract}/>}
    </div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
